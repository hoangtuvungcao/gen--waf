<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="deep_space" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <linearGradient id="cyber_flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="shield_glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#deep_space)"/>

  <g opacity="0.1" stroke="#38BDF8" stroke-width="1">
    <path d="M0 128H512M0 256H512M0 384H512M128 0V512M256 0V512M384 0V512"/>
  </g>

  <rect x="0" y="100" width="512" height="312" fill="url(#cyber_flow)" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite" />
  </rect>

  <circle cx="256" cy="256" r="140" stroke="#38BDF8" stroke-width="1" stroke-dasharray="4 8" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite" />
  </circle>

  <g filter="url(#glow)">
    <path d="M256 140 L330 170 V342 L256 372 L182 342 V170 L256 140Z" 
          fill="url(#shield_glass)" 
          stroke="#22D3EE" 
          stroke-width="2" />
    
    <path d="M256 180 L300 200 V312 L256 332 L212 312 V200 L256 180Z" fill="#22D3EE" opacity="0.8">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite" />
    </path>
    
    <rect x="253" y="210" width="6" height="92" rx="3" fill="white" filter="url(#glow)">
        <animate attributeName="fill" values="#white;#22D3EE;#white" dur="1.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <circle r="3" fill="#22D3EE">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M100 220 Q 180 220 256 256 T 412 292" />
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" />
  </circle>
  
  <circle r="2" fill="#818CF8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M100 292 Q 180 292 256 256 T 412 220" />
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
  </circle>

  <rect x="20" y="20" width="472" height="472" rx="90" stroke="#38BDF8" stroke-opacity="0.1" stroke-width="2"/>
</svg>
