# Ho so 05:
# Multi-node hien tai cua GEN WAF.
#
# Dung cho:
# - nhieu node gendp dung cung 1 declarative config
# - moi node tu poll/nhan effective config tu genctl
# - Cloudflare hoac LB ben ngoai phan tan traffic vao nhieu node origin
#
# Luu y quan trong:
# - deployment: multi da co tac dung that trong compile/autotune
# - runtime reverse proxy/WAF/challenge/xdp profile van chay that tren tung node
# - da co shared decision feed qua genctl + genagent + file sync local
# - da co shared rate pressure feed xuong data-plane qua genagent
# - da co heartbeat/ack version tu node ve controller
# - neu bat Redis o controller, reputation/observation se duoc chia se that hon
# - van chua phai full cluster state production-grade vi chua co direct Redis client trong data-plane

system:
  name: gen-waf-multi-node
  deployment: multi
  mode: normal
  auto_mode: true

edge:
  cloudflare:
    enabled: true
    lock_origin_to_cf: true
    trust_cf_headers: true
    cache_static: true

origin:
  xdp:
    enabled: true
    mode: adaptive
    interface: eth0
    attach_mode: generic
    sync_from_controller: true
    allow_cf_only: true
    drop_invalid_packets: true
    per_ip_guard: true
  proxy:
    engine: gendp
    listen_port: 80
    real_ip_from_edge_only: true
    cache_enabled: true
    keepalive: true
    header_read_timeout_ms: 2000
    max_request_bytes: 1048576
    max_response_cache_entries: 2048
    upstream_connect_timeout_ms: 1200
    upstream_read_timeout_ms: 4000

routing:
  backend_pools:
    - name: app_pool
      balance: round_robin
      health_check_path: /healthz
      health_check_interval_ms: 5000
      health_check_timeout_ms: 1000
      unhealthy_threshold: 2
      healthy_threshold: 2
      fail_timeout_ms: 10000
      retry_attempts: 1
      servers:
        - id: app-1
          address: 10.10.0.21:8080
          weight: 1
        - id: app-2
          address: 10.10.0.22:8080
          weight: 1
        - id: app-3
          address: 10.10.0.23:8080
          weight: 1

    - name: api_pool
      balance: ip_hash
      health_check_path: /healthz
      health_check_interval_ms: 4000
      health_check_timeout_ms: 1000
      unhealthy_threshold: 2
      healthy_threshold: 2
      fail_timeout_ms: 10000
      retry_attempts: 1
      servers:
        - id: api-1
          address: 10.10.1.21:8090
          weight: 1
        - id: api-2
          address: 10.10.1.22:8090
          weight: 1

  virtual_hosts:
    - domains:
        - example.com
        - www.example.com
      default_pool: app_pool
      path_rules:
        - path_prefix: /api/
          pool: api_pool

waf:
  enabled: true
  engine: genwaf-runtime
  ruleset: gen_policy_v1
  paranoia_level: 2
  mode: anomaly_block
  compatibility:
    crs_import: true

rate_limit:
  enabled: true
  backend: cluster_shared
  requests_per_second: 14
  burst: 40
  max_tracked_ips: 80000
  sensitive_paths:
    - /login
    - /register
    - /api/auth

bot_defense:
  enabled: true
  default_action: allow
  js_challenge: true
  replay_protection: true
  challenge_difficulty: 4
  challenge_token_cache_entries: 20000
  challenge_pass_ttl_seconds: 300
  pow:
    enabled: true
    provider: altcha
    mode: adaptive

behavior:
  enabled: true
  decision_cache_ttl: 60s
  max_decision_entries: 30000
  fingerprinting:
    http: true
    cookie: true

automation:
  enabled: true
  auto_tune_from_host: true
  escalate_on:
    high_rps_multiplier: 3
    high_4xx_ratio: 0.4
    high_waf_hits_per_min: 250
    high_challenge_fail_ratio: 0.6
  cooldown_minutes: 20
  actions:
    elevated:
      xdp_mode: adaptive
      rate_limit_multiplier: 0.8
      enable_sensitive_challenge: true
      waf_paranoia_level: 3
    under_attack:
      xdp_mode: strict
      rate_limit_multiplier: 0.5
      enable_sitewide_challenge: true
      waf_paranoia_level: 4
      cache_aggressive: true

cluster:
  sync_enabled: true
  sync_backend: controller
  config_push: false
  config_versioning: true
  staged_rollout: false
  shared_decisions: true
  shared_decision_ttl_seconds: 900
  local_decision_path: runtime/cluster-decisions.json
  local_observation_path: runtime/node-observations.json
  shared_rate_limit_path: runtime/cluster-rate-limits.json
  decision_poll_interval_ms: 1000
  observation_flush_interval_ms: 2000
  observation_window_seconds: 15
  shared_rate_limit_threshold: 250
  shared_challenge_threshold: 120
  node_heartbeat_interval_seconds: 15
  controller_state_path: runtime/controller-state.json

observability:
  metrics: true
  logs: false
  dashboard: true
