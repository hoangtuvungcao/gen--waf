# Ho so 04:
# Nhieu domain + nhieu backend pool + route theo path.
# Day la profile gan nhat voi reverse proxy thuc te cho nhieu website/API.

system:
  name: gen-waf-mixed-routing
  deployment: single
  mode: normal
  auto_mode: true

edge:
  cloudflare:
    enabled: true
    lock_origin_to_cf: true
    trust_cf_headers: true
    cache_static: true

origin:
  xdp:
    enabled: true
    mode: adaptive
    interface: lo
    attach_mode: generic
    allow_cf_only: true
    drop_invalid_packets: true
    per_ip_guard: true
  proxy:
    engine: gendp
    listen_port: 80
    real_ip_from_edge_only: true
    cache_enabled: true
    keepalive: true
    header_read_timeout_ms: 2000
    max_request_bytes: 1048576
    max_response_cache_entries: 1024
    upstream_connect_timeout_ms: 1200
    upstream_read_timeout_ms: 4000

routing:
  backend_pools:
    - name: web_pool
      balance: round_robin
      health_check_path: /healthz
      health_check_interval_ms: 5000
      health_check_timeout_ms: 1000
      unhealthy_threshold: 2
      healthy_threshold: 2
      fail_timeout_ms: 10000
      retry_attempts: 1
      servers:
        - id: web-1
          address: 127.0.0.1:8081
          weight: 1
        - id: web-2
          address: 127.0.0.1:8082
          weight: 1
    - name: api_pool
      balance: ip_hash
      health_check_path: /healthz
      health_check_interval_ms: 4000
      health_check_timeout_ms: 1000
      unhealthy_threshold: 2
      healthy_threshold: 2
      fail_timeout_ms: 10000
      retry_attempts: 1
      servers:
        - id: api-1
          address: 127.0.0.1:8091
          weight: 1
        - id: api-2
          address: 127.0.0.1:8092
          weight: 1
    - name: blog_pool
      balance: round_robin
      health_check_path: /healthz
      health_check_interval_ms: 5000
      health_check_timeout_ms: 1000
      unhealthy_threshold: 2
      healthy_threshold: 2
      fail_timeout_ms: 10000
      retry_attempts: 1
      servers:
        - id: blog-1
          address: 127.0.0.1:8083
          weight: 1
  virtual_hosts:
    - domains:
        - example.com
        - www.example.com
      default_pool: web_pool
      path_rules:
        - path_prefix: /api/
          pool: api_pool
        - path_prefix: /blog/
          pool: blog_pool
    - domains:
        - api.example.net
        - shop.example.net
      default_pool: api_pool
      path_rules: []
    - domains:
        - "*"
      default_pool: web_pool
      path_rules: []

waf:
  enabled: true
  paranoia_level: 2
  mode: anomaly_block
  compatibility:
    crs_import: true

rate_limit:
  enabled: true
  backend: local
  requests_per_second: 10
  burst: 30
  max_tracked_ips: 50000
  sensitive_paths:
    - /login
    - /register
    - /api/auth
    - /checkout

bot_defense:
  enabled: true
  default_action: allow
  js_challenge: true
  replay_protection: true
  challenge_difficulty: 4
  challenge_token_cache_entries: 20000
  challenge_pass_ttl_seconds: 300
  pow:
    enabled: true
    provider: altcha
    mode: adaptive

behavior:
  enabled: true
  decision_cache_ttl: 60s
  max_decision_entries: 20000
  fingerprinting:
    http: true
    cookie: true

automation:
  enabled: true
  auto_tune_from_host: true
  escalate_on:
    high_rps_multiplier: 3
    high_4xx_ratio: 0.4
    high_waf_hits_per_min: 200
    high_challenge_fail_ratio: 0.6
  cooldown_minutes: 20
  actions:
    elevated:
      xdp_mode: adaptive
      rate_limit_multiplier: 0.7
      enable_sensitive_challenge: true
      waf_paranoia_level: 3
    under_attack:
      xdp_mode: strict
      rate_limit_multiplier: 0.4
      enable_sitewide_challenge: true
      waf_paranoia_level: 4
      cache_aggressive: true

observability:
  metrics: true
  logs: false
